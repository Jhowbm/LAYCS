services:
  - type: web
    name: laycs
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: RENDER
        value: true
      - key: DEBUG
        value: false